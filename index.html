<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="https://vero.photography/assets/images/favicon.ico" />
    <link rel="icon" type="image/x-icon" href="https://vero.photography/assets/images/favicon.ico" />
    <link rel="apple-touch-icon" href="https://vero.photography/assets/images/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Vero Photography | Wedding & Portrait Photographer in Scranton, Pennsylvania</title>
    <meta name="description" content="Wedding, portrait, family, and maternity photography by Veronika Gerzon. Based in Scranton, Pennsylvania — available worldwide." />

    <!-- Preload the hero camera image so LCP starts the network fetch before JS parses -->
    <link rel="preload" as="image" href="/assets/images/eos_r6_mark_ii_body_v2.webp" fetchpriority="high" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vero Photography" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_DO" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image"
      content="https://vero.photography/assets/photos/site/contact-bg.webp"
    />
    <meta property="og:image:alt" content="Vero Photography - Professional Photographer" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Photographer",
      "name": "Vero Photography",
      "alternateName": "Veronika Gerzon Photography",
      "image": "https://vero.photography/assets/photos/site/contact-bg.webp",
      "logo": "https://vero.photography/assets/images/logo.svg",
      "url": "https://vero.photography",
      "telephone": "+1-570-909-5707",
      "priceRange": "$$",
      "description": "Wedding, portrait, family, and maternity photography by Veronika Gerzon. Based in Scranton, Pennsylvania — available worldwide.",
      "founder": {
        "@type": "Person",
        "name": "Veronika Gerzon"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Scranton",
        "addressRegion": "PA",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "41.4087",
        "longitude": "-75.6621"
      },
      "areaServed": [
        { "@type": "City", "name": "Scranton" },
        { "@type": "AdministrativeArea", "name": "Northeast Pennsylvania" },
        { "@type": "Country", "name": "United States" },
        { "@type": "Place", "name": "Worldwide" }
      ],
      "knowsAbout": [
        "Wedding Photography",
        "Portrait Photography",
        "Family Photography",
        "Maternity Photography",
        "Destination Photography"
      ],
      "sameAs": [
        "https://www.instagram.com/vero.art.photo/"
      ]
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "Wedding Photography",
      "provider": {
        "@type": "Organization",
        "name": "Vero Photography",
        "url": "https://vero.photography"
      },
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
                  "latitude": "41.4087",
        "longitude": "-75.6621"
        },
        "geoRadius": "50000"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Photography Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Wedding Photography Package",
              "description": "Full day wedding coverage with professional editing and high-resolution digital images"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Portrait Session",
              "description": "Professional portrait photography session with multiple outfit changes and locations"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Family Photography",
              "description": "Family portrait session capturing precious moments and relationships"
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
